<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family: "Comic Sans MS", "Comic Sans", cursive;
text-align:center;
background:#f5f5f5;
letter-spacing: 2px;
}

button{
font-family: "Comic Sans MS", "Comic Sans", cursive;
width:40%;
padding:25px;
margin:10px;
font-size:32px;
border-radius:10px;
border:none;
text-transform: lowercase;
}

.play{
width:80%;
background:#4CAF50;
color:white;
}

</style>
</head>

<body>

<h2>Listen to the sound and choose the correct word</h2>

<button onclick="guess('cat')">cat</button>
<button onclick="guess('dog')">dog</button>

<br>

<button onclick="guess('bat')">bat</button>
<button onclick="guess('map')">map</button>

<br><br>

<button class="play" onclick="playSound()">🔊 Play Sound</button>

<audio id="cat" src="cat.mp3"></audio>
<audio id="dog" src="dog.mp3"></audio>
<audio id="bat" src="bat.mp3"></audio>
<audio id="map" src="map.mp3"></audio>

<script>

let sounds = ["cat","dog","bat","map"];
let currentSound = "";

function playSound(){

currentSound = sounds[Math.floor(Math.random()*sounds.length)];

document.getElementById(currentSound).currentTime = 0;
document.getElementById(currentSound).play();

}

function guess(word){

if(word == currentSound){
alert("Correct!");
}
else{
alert("Try again!");
}

}

</script>

</body>
</html>
